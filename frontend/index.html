<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoachMyRun — AI Running Coach</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ===== CSS VARIABLES & RESET ===== */
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a24;
      --accent: #e8ff47;
      --accent2: #ff4d6d;
      --text: #f0f0f8;
      --muted: #6b6b8a;
      --border: #1e1e2e;
      --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
    #root { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

    /* HEADER */
    .app-header { padding: 16px 20px 0; background: var(--bg); position: sticky; top: 0; z-index: 100; }
    .logo { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
    .logo-icon { font-size: 24px; filter: drop-shadow(0 0 8px var(--accent)); }
    .logo-text { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; color: var(--accent); }

    /* NAV */
    .nav { display: flex; gap: 4px; border-bottom: 1px solid var(--border); }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 8px 4px 12px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--muted); cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
    .nav-btn:hover { color: var(--text); }
    .nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .nav-icon { font-size: 16px; }
    .nav-label { font-size: 10px; font-weight: 500; letter-spacing: 0.5px; }

    /* MAIN */
    .app-main { flex: 1; padding: 24px 20px 40px; }

    /* PAGE HEADERS */
    .page-header { margin-bottom: 28px; }
    .page-header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 2px; line-height: 1; }
    .subtitle { color: var(--muted); font-size: 14px; margin-top: 4px; }

    /* DASHBOARD */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 32px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 16px; display: flex; flex-direction: column; gap: 6px; transition: border-color 0.2s; }
    .stat-card:hover { border-color: var(--accent); }
    .stat-icon { font-size: 20px; }
    .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 1px; color: var(--accent); line-height: 1; }
    .stat-unit { font-size: 14px; color: var(--muted); font-family: 'DM Sans', sans-serif; }
    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; margin-bottom: 12px; color: var(--muted); }
    .recent-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 28px; }
    .recent-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; }
    .recent-date { font-size: 13px; color: var(--muted); }
    .recent-stats { display: flex; gap: 12px; align-items: center; font-size: 13px; font-weight: 500; }
    .pace-badge { background: var(--accent); color: var(--bg); padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }

    /* EMPTY STATE */
    .empty-state { text-align: center; padding: 60px 20px; }
    .empty-icon { font-size: 64px; margin-bottom: 16px; }
    .empty-state h2 { font-size: 22px; margin-bottom: 8px; }
    .empty-state p { color: var(--muted); margin-bottom: 24px; }

    /* BUTTONS */
    .cta-btn { display: inline-block; padding: 14px 28px; background: var(--accent); color: var(--bg); border: none; border-radius: 100px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .cta-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(232,255,71,0.3); }
    .cta-btn.outline { background: transparent; border: 1.5px solid var(--border); color: var(--text); }
    .cta-btn.outline:hover { border-color: var(--accent); color: var(--accent); box-shadow: none; }
    .quick-actions { display: flex; gap: 12px; flex-wrap: wrap; }

    /* TRACKER */
    .error-banner { background: rgba(255,77,109,0.1); border: 1px solid var(--accent2); color: var(--accent2); padding: 10px 16px; border-radius: 10px; font-size: 13px; margin-bottom: 24px; }
    .tracker-ring { display: flex; justify-content: center; margin: 32px 0; }
    .ring { width: 220px; height: 220px; border-radius: 50%; border: 3px solid var(--surface2); display: flex; align-items: center; justify-content: center; position: relative; background: var(--surface); }
    .ring::before { content: ''; position: absolute; inset: -3px; border-radius: 50%; border: 3px solid transparent; border-top-color: var(--accent); }
    .ring.pulse::before { animation: spin 2s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .ring-inner { text-align: center; }
    .ring-duration { font-family: 'Bebas Neue', sans-serif; font-size: 56px; letter-spacing: 3px; color: var(--accent); line-height: 1; }
    .ring-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; }
    .live-stats { display: flex; justify-content: space-around; margin-bottom: 36px; }
    .live-stat { text-align: center; }
    .live-value { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 1px; color: var(--text); }
    .live-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .tracker-controls { display: flex; gap: 12px; justify-content: center; }
    .control-btn { padding: 16px 36px; border: none; border-radius: 100px; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .control-btn.start { background: var(--accent); color: var(--bg); }
    .control-btn.pause { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .control-btn.stop { background: var(--accent2); color: white; }
    .control-btn:hover { transform: translateY(-2px); }

    /* RUN SUMMARY */
    .run-summary { background: var(--surface); border-radius: var(--radius); overflow: hidden; margin-bottom: 28px; }
    .summary-row { display: flex; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
    .summary-row:last-child { border-bottom: none; }
    .summary-label { color: var(--muted); }
    .summary-value { font-weight: 600; color: var(--accent); }

    /* SAVE SUCCESS */
    .save-success { text-align: center; padding: 80px 20px; }
    .success-icon { width: 72px; height: 72px; border-radius: 50%; background: var(--accent); color: var(--bg); font-size: 36px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-weight: bold; }
    .save-success h2 { font-size: 28px; margin-bottom: 8px; }
    .save-success p { color: var(--muted); margin-bottom: 24px; }

    /* AI COACH */
    .coach-page { display: flex; flex-direction: column; height: calc(100vh - 160px); }
    .coach-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .coach-action-btn { padding: 8px 16px; border-radius: 100px; border: none; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; background: var(--accent); color: var(--bg); }
    .coach-action-btn.outline { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .coach-action-btn:hover { transform: translateY(-1px); }
    .coach-action-btn.outline:hover { border-color: var(--accent); color: var(--accent); }
    .chat-window { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; padding: 4px 0 16px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    .chat-msg { display: flex; gap: 10px; align-items: flex-start; }
    .chat-msg.user { flex-direction: row-reverse; }
    .coach-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); color: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
    .msg-bubble { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.6; }
    .chat-msg.coach .msg-bubble { background: var(--surface); border: 1px solid var(--border); border-top-left-radius: 4px; white-space: pre-wrap; }
    .chat-msg.user .msg-bubble { background: var(--accent); color: var(--bg); border-top-right-radius: 4px; }
    .msg-bubble.loading { display: flex; gap: 4px; align-items: center; padding: 16px; }
    .msg-bubble.loading span { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); animation: bounce 1.2s infinite; }
    .msg-bubble.loading span:nth-child(2) { animation-delay: 0.2s; }
    .msg-bubble.loading span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); background: var(--accent); } }
    .chat-input-row { display: flex; gap: 10px; padding-top: 12px; border-top: 1px solid var(--border); }
    .chat-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 100px; padding: 12px 20px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; }
    .chat-input:focus { border-color: var(--accent); }
    .chat-input::placeholder { color: var(--muted); }
    .send-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--accent); color: var(--bg); border: none; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .send-btn:not(:disabled):hover { transform: scale(1.05); }

    /* HISTORY */
    .history-list { display: flex; flex-direction: column; gap: 12px; }
    .history-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; transition: border-color 0.2s; }
    .history-card:hover { border-color: var(--accent); }
    .history-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .run-number { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1px; color: var(--accent); }
    .run-date { font-size: 12px; color: var(--muted); }
    .history-metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .metric { text-align: center; }
    .metric-icon { display: block; font-size: 16px; margin-bottom: 4px; }
    .metric-value { display: block; font-weight: 600; font-size: 14px; }
    .metric-label { display: block; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <!-- ===== UTILS ===== -->
  <script type="text/babel" data-type="module">
    window.Formatters = {
      formatDuration(seconds) {
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        const s = seconds % 60;
        if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      },
      formatDistance(meters) {
        return (meters / 1000).toFixed(2);
      },
      formatPace(minPerKm) {
        if (!minPerKm || !isFinite(minPerKm) || minPerKm <= 0) return '--:--';
        const min = Math.floor(minPerKm);
        const sec = Math.round((minPerKm - min) * 60);
        return `${min}:${String(sec).padStart(2,'0')}`;
      }
    };
  </script>

  <!-- ===== AI COACH SERVICE ===== -->
  <script type="text/babel" data-type="module">
    window.AICoachService = {
      async getCoachingAdvice(prompt) {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            system: `You are CoachMyRun's elite AI running coach. You are motivating, data-driven, and give specific, actionable advice. Keep responses concise (3-5 sentences max per section). Use runner lingo naturally. Be encouraging but honest.`,
            messages: [{ role: 'user', content: prompt }]
          })
        });
        const data = await response.json();
        return data.content?.map(c => c.text || '').join('') || 'Unable to get coaching advice right now.';
      },
      buildRunAnalysisPrompt(run, history) {
        const pace = run.distance > 0 ? run.duration / 60 / (run.distance / 1000) : 0;
        const distKm = (run.distance / 1000).toFixed(2);
        let histCtx = '';
        if (history.length > 1) {
          const prev = history.slice(1, 6);
          const avgDist = prev.reduce((s,r) => s + r.distance, 0) / prev.length;
          const avgPace = prev.reduce((s,r) => s + r.duration/60/(r.distance/1000||1), 0) / prev.length;
          histCtx = `Previous avg distance: ${(avgDist/1000).toFixed(2)}km, avg pace: ${avgPace.toFixed(2)} min/km.`;
        }
        return `Analyze this run:\nDistance: ${distKm}km\nDuration: ${Math.floor(run.duration/60)}min ${run.duration%60}s\nAvg Pace: ${pace.toFixed(2)} min/km\nAvg Speed: ${run.avgSpeed?.toFixed(1)||'N/A'} km/h\nTotal runs: ${history.length}\n${histCtx}\n\nProvide: 1) Performance Summary 2) What went well 3) Areas to improve 4) Next run recommendation`;
      },
      buildGeneralCoachPrompt(question, history) {
        const totalRuns = history.length;
        const totalDist = (history.reduce((s,r) => s + r.distance, 0) / 1000).toFixed(1);
        return `Runner: ${totalRuns} runs, ${totalDist}km total.\nQuestion: ${question}\nGive specific actionable coaching advice.`;
      }
    };
  </script>

  <!-- ===== HOOK: useRunTracker ===== -->
  <script type="text/babel" data-type="module">
    const { useState, useEffect, useRef } = React;

    window.useRunTracker = function() {
      const [isRunning, setIsRunning] = useState(false);
      const [isPaused, setIsPaused] = useState(false);
      const [duration, setDuration] = useState(0);
      const [distance, setDistance] = useState(0);
      const [currentSpeed, setCurrentSpeed] = useState(0);
      const [error, setError] = useState(null);

      const timerRef = useRef(null);
      const watchRef = useRef(null);
      const lastPosRef = useRef(null);
      const simRef = useRef(null);
      const isRunningRef = useRef(false);

      const calcDistance = (p1, p2) => {
        const R = 6371000;
        const dLat = (p2.lat - p1.lat) * Math.PI / 180;
        const dLon = (p2.lon - p1.lon) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(p1.lat*Math.PI/180)*Math.cos(p2.lat*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      };

      const startTimer = () => {
        timerRef.current = setInterval(() => setDuration(d => d + 1), 1000);
      };

      const startSimGPS = () => {
        simRef.current = setInterval(() => {
          if (!isRunningRef.current) return;
          const increment = Math.random() * 3 + 1.5;
          setDistance(d => d + increment);
          setCurrentSpeed(Math.random() * 4 + 6);
        }, 1000);
      };

      const start = () => {
        setIsRunning(true); setIsPaused(false);
        setDuration(0); setDistance(0); setCurrentSpeed(0);
        lastPosRef.current = null;
        isRunningRef.current = true;
        startTimer();

        if (navigator.geolocation) {
          watchRef.current = navigator.geolocation.watchPosition(
            pos => {
              const newPos = { lat: pos.coords.latitude, lon: pos.coords.longitude, time: Date.now() };
              if (lastPosRef.current) {
                const dist = calcDistance(lastPosRef.current, newPos);
                const dt = (newPos.time - lastPosRef.current.time) / 1000;
                if (dt > 0) setCurrentSpeed(dist / dt * 3.6);
                setDistance(d => d + dist);
              }
              lastPosRef.current = newPos;
            },
            () => { setError('GPS unavailable – using simulated data'); startSimGPS(); },
            { enableHighAccuracy: true, maximumAge: 0 }
          );
        } else {
          setError('GPS not supported – using simulated data');
          startSimGPS();
        }
      };

      const pause = () => {
        setIsPaused(true);
        isRunningRef.current = false;
        clearInterval(timerRef.current);
        clearInterval(simRef.current);
        if (watchRef.current) navigator.geolocation.clearWatch(watchRef.current);
      };

      const resume = () => {
        setIsPaused(false);
        isRunningRef.current = true;
        startTimer();
        if (navigator.geolocation) {
          watchRef.current = navigator.geolocation.watchPosition(
            pos => {
              const newPos = { lat: pos.coords.latitude, lon: pos.coords.longitude, time: Date.now() };
              if (lastPosRef.current) {
                setDistance(d => d + calcDistance(lastPosRef.current, newPos));
              }
              lastPosRef.current = newPos;
            },
            () => startSimGPS(),
            { enableHighAccuracy: true }
          );
        } else startSimGPS();
      };

      const stopRun = () => {
        isRunningRef.current = false;
        setIsRunning(false); setIsPaused(false);
        clearInterval(timerRef.current);
        clearInterval(simRef.current);
        if (watchRef.current) navigator.geolocation.clearWatch(watchRef.current);
      };

      useEffect(() => () => {
        clearInterval(timerRef.current);
        clearInterval(simRef.current);
        if (watchRef.current) navigator.geolocation.clearWatch(watchRef.current);
      }, []);

      return { isRunning, isPaused, duration, distance, currentSpeed, error, start, pause, resume, stopRun };
    };
  </script>

  <!-- ===== COMPONENT: Nav ===== -->
  <script type="text/babel" data-type="module">
    const tabs = [
      { id: 'dashboard', label: 'Dashboard', icon: '◈' },
      { id: 'track', label: 'Track Run', icon: '▶' },
      { id: 'coach', label: 'AI Coach', icon: '✦' },
      { id: 'history', label: 'History', icon: '◷' },
    ];
    window.Nav = function({ activeTab, setActiveTab }) {
      return React.createElement('nav', { className: 'nav' },
        tabs.map(tab => React.createElement('button', {
          key: tab.id,
          className: `nav-btn ${activeTab === tab.id ? 'active' : ''}`,
          onClick: () => setActiveTab(tab.id)
        },
          React.createElement('span', { className: 'nav-icon' }, tab.icon),
          React.createElement('span', { className: 'nav-label' }, tab.label)
        ))
      );
    };
  </script>

  <!-- ===== COMPONENT: Dashboard ===== -->
  <script type="text/babel" data-type="module">
    const { formatDuration, formatDistance, formatPace } = window.Formatters;

    function StatCard({ label, value, unit, icon }) {
      return React.createElement('div', { className: 'stat-card' },
        React.createElement('div', { className: 'stat-icon' }, icon),
        React.createElement('div', { className: 'stat-value' },
          value,
          unit && React.createElement('span', { className: 'stat-unit' }, ` ${unit}`)
        ),
        React.createElement('div', { className: 'stat-label' }, label)
      );
    }

    window.Dashboard = function({ runHistory, setActiveTab }) {
      const totalRuns = runHistory.length;
      const totalDistance = runHistory.reduce((s, r) => s + r.distance, 0);
      const totalTime = runHistory.reduce((s, r) => s + r.duration, 0);
      const avgPace = totalDistance > 0 ? totalTime / 60 / (totalDistance / 1000) : 0;
      const recentRuns = runHistory.slice(0, 3);

      return React.createElement('div', { className: 'dashboard' },
        React.createElement('div', { className: 'page-header' },
          React.createElement('h1', null, 'Your Dashboard'),
          React.createElement('p', { className: 'subtitle' }, 'Track your progress, crush your goals')
        ),
        React.createElement('div', { className: 'stats-grid' },
          React.createElement(StatCard, { label: 'Total Runs', value: totalRuns, unit: 'runs', icon: '🏃' }),
          React.createElement(StatCard, { label: 'Total Distance', value: formatDistance(totalDistance), unit: 'km', icon: '📍' }),
          React.createElement(StatCard, { label: 'Total Time', value: formatDuration(totalTime), unit: '', icon: '⏱' }),
          React.createElement(StatCard, { label: 'Avg Pace', value: avgPace > 0 ? formatPace(avgPace) : '--', unit: 'min/km', icon: '⚡' })
        ),
        recentRuns.length > 0 ? React.createElement('div', { className: 'recent-section' },
          React.createElement('h2', { className: 'section-title' }, 'Recent Runs'),
          React.createElement('div', { className: 'recent-list' },
            recentRuns.map((run, i) => {
              const pace = run.distance > 0 ? run.duration / 60 / (run.distance / 1000) : 0;
              return React.createElement('div', { key: i, className: 'recent-card' },
                React.createElement('div', { className: 'recent-date' },
                  new Date(run.date).toLocaleDateString('en-IN', { weekday: 'short', month: 'short', day: 'numeric' })
                ),
                React.createElement('div', { className: 'recent-stats' },
                  React.createElement('span', null, `${formatDistance(run.distance)} km`),
                  React.createElement('span', null, formatDuration(run.duration)),
                  React.createElement('span', { className: 'pace-badge' }, `${formatPace(pace)}/km`)
                )
              );
            })
          ),
          React.createElement('div', { className: 'quick-actions' },
            React.createElement('button', { className: 'cta-btn', onClick: () => setActiveTab('track') }, '▶ Start New Run'),
            React.createElement('button', { className: 'cta-btn outline', onClick: () => setActiveTab('coach') }, '✦ Get AI Coaching')
          )
        ) : React.createElement('div', { className: 'empty-state' },
          React.createElement('div', { className: 'empty-icon' }, '🏃‍♂️'),
          React.createElement('h2', null, 'No runs yet'),
          React.createElement('p', null, 'Start tracking your first run to see your stats here'),
          React.createElement('button', { className: 'cta-btn', onClick: () => setActiveTab('track') }, 'Start Your First Run')
        )
      );
    };
  </script>

  <!-- ===== COMPONENT: RunTracker ===== -->
  <script type="text/babel" data-type="module">
    const { useState: useState2 } = React;
    const { formatDuration: fd, formatDistance: fdist, formatPace: fp } = window.Formatters;

    function LiveStat({ label, value }) {
      return React.createElement('div', { className: 'live-stat' },
        React.createElement('div', { className: 'live-value' }, value),
        React.createElement('div', { className: 'live-label' }, label)
      );
    }

    function SummaryRow({ label, value }) {
      return React.createElement('div', { className: 'summary-row' },
        React.createElement('span', { className: 'summary-label' }, label),
        React.createElement('span', { className: 'summary-value' }, value)
      );
    }

    window.RunTracker = function({ onSaveRun }) {
      const tracker = window.useRunTracker();
      const { isRunning, isPaused, duration, distance, currentSpeed, error, start, pause, resume, stopRun } = tracker;
      const [saved, setSaved] = useState2(false);
      const [completedRun, setCompletedRun] = useState2(null);
      const [finalDuration, setFinalDuration] = useState2(0);
      const [finalDistance, setFinalDistance] = useState2(0);

      const handleStop = () => {
        const d = duration, dist = distance;
        stopRun();
        const run = {
          duration: d, distance: dist,
          date: new Date().toISOString(),
          avgSpeed: dist > 0 ? (dist / 1000) / (d / 3600) : 0
        };
        setFinalDuration(d); setFinalDistance(dist);
        setCompletedRun(run);
      };

      const handleSave = () => { onSaveRun(completedRun); setSaved(true); };
      const handleReset = () => { setCompletedRun(null); setSaved(false); };

      const pace = finalDuration > 0 && finalDistance > 0 ? finalDuration / 60 / (finalDistance / 1000) : 0;
      const livePace = duration > 0 && distance > 0 ? duration / 60 / (distance / 1000) : 0;

      if (saved) return React.createElement('div', { className: 'tracker-page' },
        React.createElement('div', { className: 'save-success' },
          React.createElement('div', { className: 'success-icon' }, '✓'),
          React.createElement('h2', null, 'Run Saved!'),
          React.createElement('p', null, 'Great work! Check your AI Coach for personalized feedback.'),
          React.createElement('button', { className: 'cta-btn', onClick: handleReset }, 'Start Another Run')
        )
      );

      if (completedRun) return React.createElement('div', { className: 'tracker-page' },
        React.createElement('div', { className: 'page-header' },
          React.createElement('h1', null, 'Run Complete!'),
          React.createElement('p', { className: 'subtitle' }, "Here's your summary")
        ),
        React.createElement('div', { className: 'run-summary' },
          React.createElement(SummaryRow, { label: 'Distance', value: `${fdist(finalDistance)} km` }),
          React.createElement(SummaryRow, { label: 'Duration', value: fd(finalDuration) }),
          React.createElement(SummaryRow, { label: 'Avg Pace', value: pace > 0 ? `${fp(pace)} /km` : '--' }),
          React.createElement(SummaryRow, { label: 'Avg Speed', value: `${completedRun.avgSpeed.toFixed(1)} km/h` })
        ),
        React.createElement('div', { className: 'quick-actions' },
          React.createElement('button', { className: 'cta-btn', onClick: handleSave }, '💾 Save Run'),
          React.createElement('button', { className: 'cta-btn outline', onClick: handleReset }, 'Discard')
        )
      );

      return React.createElement('div', { className: 'tracker-page' },
        React.createElement('div', { className: 'page-header' },
          React.createElement('h1', null, 'Track Run'),
          React.createElement('p', { className: 'subtitle' }, "Lace up and let's go")
        ),
        error && React.createElement('div', { className: 'error-banner' }, `⚠ ${error}`),
        React.createElement('div', { className: 'tracker-ring' },
          React.createElement('div', { className: `ring ${isRunning && !isPaused ? 'pulse' : ''}` },
            React.createElement('div', { className: 'ring-inner' },
              React.createElement('div', { className: 'ring-duration' }, fd(duration)),
              React.createElement('div', { className: 'ring-label' }, 'duration')
            )
          )
        ),
        React.createElement('div', { className: 'live-stats' },
          React.createElement(LiveStat, { label: 'Distance', value: `${fdist(distance)} km` }),
          React.createElement(LiveStat, { label: 'Pace', value: livePace > 0 ? `${fp(livePace)}/km` : '--' }),
          React.createElement(LiveStat, { label: 'Speed', value: `${currentSpeed.toFixed(1)} km/h` })
        ),
        React.createElement('div', { className: 'tracker-controls' },
          !isRunning && !isPaused && React.createElement('button', { className: 'control-btn start', onClick: start }, '▶ Start Run'),
          isRunning && !isPaused && React.createElement(React.Fragment, null,
            React.createElement('button', { className: 'control-btn pause', onClick: pause }, '⏸ Pause'),
            React.createElement('button', { className: 'control-btn stop', onClick: handleStop }, '⏹ Stop')
          ),
          isPaused && React.createElement(React.Fragment, null,
            React.createElement('button', { className: 'control-btn start', onClick: resume }, '▶ Resume'),
            React.createElement('button', { className: 'control-btn stop', onClick: handleStop }, '⏹ Stop')
          )
        )
      );
    };
  </script>

  <!-- ===== COMPONENT: AICoach ===== -->
  <script type="text/babel" data-type="module">
    const { useState: useStateAI } = React;
    const QUICK_QUESTIONS = [
      'How do I improve my pace?',
      'Tips for breathing while running?',
      'How to avoid shin splints?',
      'Best warm-up routine?',
      'How to run longer distances?',
    ];

    window.AICoach = function({ currentRun, runHistory }) {
      const [messages, setMessages] = useStateAI([{
        role: 'coach',
        text: "Hey there! I'm your AI running coach. Ask me anything about your training, or I can analyze your latest run. Let's get you faster! 🏃⚡"
      }]);
      const [input, setInput] = useStateAI('');
      const [loading, setLoading] = useStateAI(false);

      const addMsg = (role, text) => setMessages(p => [...p, { role, text }]);

      const sendMessage = async (text) => {
        const msg = text || input.trim();
        if (!msg) return;
        addMsg('user', msg);
        setInput('');
        setLoading(true);
        try {
          const prompt = window.AICoachService.buildGeneralCoachPrompt(msg, runHistory);
          const reply = await window.AICoachService.getCoachingAdvice(prompt);
          addMsg('coach', reply);
        } catch { addMsg('coach', '⚠ Couldn\'t connect to AI Coach. Check your network.'); }
        setLoading(false);
      };

      const analyzeLastRun = async () => {
        addMsg('user', 'Analyze my last run');
        if (!currentRun) { addMsg('coach', 'No run data yet! Head to Track Run to log your first run, then come back. 💪'); return; }
        setLoading(true);
        try {
          const prompt = window.AICoachService.buildRunAnalysisPrompt(currentRun, runHistory);
          const reply = await window.AICoachService.getCoachingAdvice(prompt);
          addMsg('coach', reply);
        } catch { addMsg('coach', '⚠ Couldn\'t analyze run. Please try again.'); }
        setLoading(false);
      };

      return React.createElement('div', { className: 'coach-page' },
        React.createElement('div', { className: 'page-header' },
          React.createElement('h1', null, 'AI Coach'),
          React.createElement('p', { className: 'subtitle' }, 'Your personal running intelligence')
        ),
        React.createElement('div', { className: 'coach-actions' },
          React.createElement('button', { className: 'coach-action-btn', onClick: analyzeLastRun }, '✦ Analyze Last Run'),
          ...QUICK_QUESTIONS.map(q => React.createElement('button', {
            key: q, className: 'coach-action-btn outline', onClick: () => sendMessage(q)
          }, q))
        ),
        React.createElement('div', { className: 'chat-window' },
          ...messages.map((msg, i) => React.createElement('div', { key: i, className: `chat-msg ${msg.role}` },
            msg.role === 'coach' && React.createElement('div', { className: 'coach-avatar' }, '⚡'),
            React.createElement('div', { className: 'msg-bubble' }, React.createElement('p', null, msg.text))
          )),
          loading && React.createElement('div', { className: 'chat-msg coach' },
            React.createElement('div', { className: 'coach-avatar' }, '⚡'),
            React.createElement('div', { className: 'msg-bubble loading' },
              React.createElement('span'), React.createElement('span'), React.createElement('span')
            )
          )
        ),
        React.createElement('div', { className: 'chat-input-row' },
          React.createElement('input', {
            className: 'chat-input',
            value: input,
            onChange: e => setInput(e.target.value),
            onKeyDown: e => e.key === 'Enter' && sendMessage(),
            placeholder: 'Ask your coach anything...',
            disabled: loading
          }),
          React.createElement('button', {
            className: 'send-btn',
            onClick: () => sendMessage(),
            disabled: loading || !input.trim()
          }, '→')
        )
      );
    };
  </script>

  <!-- ===== COMPONENT: History ===== -->
  <script type="text/babel" data-type="module">
    const { formatDuration: fDur, formatDistance: fDist, formatPace: fPac } = window.Formatters;

    function Metric({ icon, label, value }) {
      return React.createElement('div', { className: 'metric' },
        React.createElement('span', { className: 'metric-icon' }, icon),
        React.createElement('span', { className: 'metric-value' }, value),
        React.createElement('span', { className: 'metric-label' }, label)
      );
    }

    window.History = function({ runHistory }) {
      if (!runHistory.length) return React.createElement('div', { className: 'history-page' },
        React.createElement('div', { className: 'page-header' },
          React.createElement('h1', null, 'Run History'),
          React.createElement('p', { className: 'subtitle' }, 'Every km counts')
        ),
        React.createElement('div', { className: 'empty-state' },
          React.createElement('div', { className: 'empty-icon' }, '📋'),
          React.createElement('h2', null, 'No runs logged yet'),
          React.createElement('p', null, 'Complete a run to see it here')
        )
      );

      return React.createElement('div', { className: 'history-page' },
        React.createElement('div', { className: 'page-header' },
          React.createElement('h1', null, 'Run History'),
          React.createElement('p', { className: 'subtitle' }, `${runHistory.length} runs logged`)
        ),
        React.createElement('div', { className: 'history-list' },
          ...runHistory.map((run, i) => {
            const pace = run.distance > 0 ? run.duration / 60 / (run.distance / 1000) : 0;
            return React.createElement('div', { key: i, className: 'history-card' },
              React.createElement('div', { className: 'history-card-header' },
                React.createElement('span', { className: 'run-number' }, `Run #${runHistory.length - i}`),
                React.createElement('span', { className: 'run-date' },
                  new Date(run.date).toLocaleDateString('en-IN', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' })
                )
              ),
              React.createElement('div', { className: 'history-metrics' },
                React.createElement(Metric, { icon: '📍', label: 'Distance', value: `${fDist(run.distance)} km` }),
                React.createElement(Metric, { icon: '⏱', label: 'Duration', value: fDur(run.duration) }),
                React.createElement(Metric, { icon: '⚡', label: 'Pace', value: pace > 0 ? `${fPac(pace)}/km` : '--' }),
                React.createElement(Metric, { icon: '🏃', label: 'Speed', value: `${run.avgSpeed?.toFixed(1)||'0.0'} km/h` })
              )
            );
          })
        )
      );
    };
  </script>

  <!-- ===== ROOT APP ===== -->
  <script type="text/babel" data-type="module">
    const { useState: useStateApp } = React;

    function App() {
      const [activeTab, setActiveTab] = useStateApp('dashboard');
      const [runHistory, setRunHistory] = useStateApp([]);
      const [currentRun, setCurrentRun] = useStateApp(null);

      const saveRun = (run) => {
        setRunHistory(prev => [run, ...prev]);
        setCurrentRun(run);
      };

      return React.createElement('div', { id: 'app' },
        React.createElement('header', { className: 'app-header' },
          React.createElement('div', { className: 'logo' },
            React.createElement('span', { className: 'logo-icon' }, '⚡'),
            React.createElement('span', { className: 'logo-text' }, 'CoachMyRun')
          ),
          React.createElement(window.Nav, { activeTab, setActiveTab })
        ),
        React.createElement('main', { className: 'app-main' },
          activeTab === 'dashboard' && React.createElement(window.Dashboard, { runHistory, setActiveTab }),
          activeTab === 'track' && React.createElement(window.RunTracker, { onSaveRun: saveRun }),
          activeTab === 'coach' && React.createElement(window.AICoach, { currentRun, runHistory }),
          activeTab === 'history' && React.createElement(window.History, { runHistory })
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
